name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: make test

      - name: Run end-to-end test
        # The e2e test runs the full LLM-driven loop and can be
        # flaky in CI (no real LLM provider, timing). Run it but
        # don't fail the build if it errors — the unit tests
        # are the deterministic signal.
        run: make e2e || echo "e2e test failed or skipped (informational only)"
        continue-on-error: true
