name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt

      - name: Sanity check: project compiles
        run: |
          python -m compileall -q core runtime services api tests
          echo "compileall: OK"

      - name: Sanity check: imports resolve
        run: |
          python -c "
          from services.state.sqlite_store import SqliteStore
          from services.messaging.inbox import InboxService
          from services.treasury.helix_treasury import HelixTreasury
          from services.payments.x402 import X402Registry
          from runtime.loop.loop import AutomatonLoop
          from services.control_plane.api import create_app
          print('imports: OK')
          "

      - name: Run unit test suite
        run: python -m pytest -q

      - name: Run end-to-end test
        run: python -m pytest tests/integration/test_e2e_platform.py -v || echo "e2e skipped (informational only)"
        continue-on-error: true
