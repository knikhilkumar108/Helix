global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: automata-dev

scrape_configs:
  - job_name: automata-control-plane
    static_configs:
      - targets: ["control-plane:8080"]
  - job_name: automata-workers
    static_configs:
      - targets: ["worker:8081"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
