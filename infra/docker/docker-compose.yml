version: "3.9"

# Local development stack. Production uses the Helm chart in infra/helm.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: automata
      POSTGRES_PASSWORD: automata
      POSTGRES_DB: automata
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automata"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../storage/postgres/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: automata
      MINIO_ROOT_PASSWORD: automata-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  jaeger:
    image: jaegertracing/all-in-one:1.59
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP

  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.2.0
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

  control-plane:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command: ["python", "-m", "services.control_plane.api"]
    environment:
      AUTOMATA_CONFIG: /app/config.dev.yaml
      AUTOMATA_PG_DSN: postgresql://automata:automata@postgres:5432/automata
      AUTOMATA_REDIS_URL: redis://redis:6379/0
      AUTOMATA_OTLP: jaeger:4317
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../..:/app

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command: ["python", "-m", "services.control_plane.worker", "--automaton-id", "atm_replace_me"]
    environment:
      AUTOMATA_PG_DSN: postgresql://automata:automata@postgres:5432/automata
      AUTOMATA_OTLP: jaeger:4317
    depends_on: [postgres]
    volumes:
      - ../..:/app

volumes:
  pgdata:
  miniodata:
