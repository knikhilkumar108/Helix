# CI/CD pipeline (GitHub Actions shape). Mirrored under infra/gitlab-ci.yml
# and infra/jenkins/Jenkinsfile in real deployments.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: automata
          POSTGRES_PASSWORD: automata
          POSTGRES_DB: automata
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U automata"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: pytest -q --maxfail=1
        env:
          AUTOMATA_PG_DSN: postgresql://automata:automata@localhost:5432/automata
          AUTOMATA_REDIS_URL: redis://localhost:6379/0
      - run: |
          mypy --strict core runtime services api
          ruff check core runtime services api
          bandit -r core runtime services api -lll
        continue-on-error: false

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/automata/control-plane:${{ github.sha }}
            ghcr.io/automata/control-plane:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: helm upgrade
        run: |
          helm upgrade --install automata ./infra/helm \
            --namespace automata --create-namespace \
            -f ./infra/helm/values.staging.yaml \
            --set image.tag=${{ github.sha }}
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_STAGING }}
