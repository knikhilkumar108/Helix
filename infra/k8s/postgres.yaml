apiVersion: v1
kind: Secret
metadata:
  name: automata-secrets
type: Opaque
stringData:
  pg_dsn: "postgresql://automata:CHANGE_ME@postgres:5432/automata"
  redis_url: "redis://redis:6379/0"
  jwt_secret: "CHANGE_ME"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: automata-config
data:
  config.yaml: |
    env: production
    observability:
      log_level: INFO
      otlp_endpoint: "otel-collector:4317"
    bus:
      backend: nats
      nats_url: "nats://nats:4222"
    security:
      jwt_ttl_seconds: 3600
      sandbox_default: microvm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: automata }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: automata-secrets, key: pg_dsn } } }
            - { name: POSTGRES_DB, value: automata }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports: [{ containerPort: 5432 }]
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "4Gi" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: postgres-data }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: { storage: 100Gi }
